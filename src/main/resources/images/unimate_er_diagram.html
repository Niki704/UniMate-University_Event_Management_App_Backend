<style>
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  USER ||--o| STUDENT : "extends"
  USER ||--o| LECTURER : "extends"
  USER ||--o| ADMIN : "extends"
  USER ||--|| PROFILE : "has"
  STUDENT ||--|| PORTFOLIO : "owns"
  STUDENT }o--|| BATCH : "belongs to"
  STUDENT }o--|| ADMIN : "verified by"
  LECTURER }o--|| ADMIN : "verified by"
  LECTURER }o--o{ BATCH : "assigned to"
  LECTURER ||--o{ STUDENTFEEDBACK : "gives"
  LECTURER ||--o{ BATCHFEEDBACK : "gives"
  STUDENT ||--o{ STUDENTFEEDBACK : "receives"
  BATCH ||--o{ BATCHFEEDBACK : "receives"
  USER ||--o{ ANNOUNCEMENT : "creates"
  ANNOUNCEMENT }o--o{ BATCH : "targets"
  ANNOUNCEMENT }o--o{ STUDENT : "targets"

  USER {
    int id PK
    string firstName
    string lastName
    string email
    string password
    string phoneNumber
    enum role
    enum accountStatus
    datetime createdDate
    datetime lastUpdated
  }
  STUDENT {
    int id PK
    int enrollmentYear
    string studentIdNumber
    int batch_id FK
    int verifiedBy_id FK
  }
  LECTURER {
    int id PK
    enum department
    int verifiedBy_id FK
  }
  ADMIN {
    int id PK
  }
  PROFILE {
    int id PK
    int user_id FK
    string bio
    string profilePictureUrl
    string githubUrl
    string linkedinUrl
  }
  PORTFOLIO {
    int id PK
    int student_id FK
    string skills
    string attachments
    string projectLinks
  }
  BATCH {
    int id PK
    string batchCode
    string name
    enum batchType
    int startYear
    int endYear
  }
  ANNOUNCEMENT {
    int id PK
    string title
    string content
    date date
    date expiryDate
    int createdBy_id FK
  }
  STUDENTFEEDBACK {
    int id PK
    date date
    string content
    enum studentRating
    int lecturer_id FK
    int student_id FK
  }
  BATCHFEEDBACK {
    int id PK
    date date
    string content
    string badges
    int lecturer_id FK
    int batch_id FK
  }
`);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
